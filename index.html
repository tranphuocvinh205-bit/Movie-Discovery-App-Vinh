<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Discovery App - Trần Phước Vinh</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-mode">
    <header>
        <div class="logo">🎬 Movie Discovery</div>
        <button id="theme-toggle">Chế độ Tối</button>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="search-box">
                <h3>Tìm kiếm</h3>
                <input type="text" id="search-input" placeholder="Nhập tên phim...">
            </div>
            
            <div class="filter-box">
                <h3>Thể loại</h3>
                <div id="genre-filters">
                    </div>
            </div>

            <div class="extra-links" style="margin-top: 30px; border-top: 1px solid #ccc; pt: 10px;">
                <p><a href="231A290104_TranPhuocVinh_bt34.html">Xem kết quả BT 34</a></p>
                <p><a href="mota.html">Xem mô tả cách làm</a></p>
            </div>
        </aside>

        <main id="movie-grid">
            </main>
    </div>

    <div id="movie-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
